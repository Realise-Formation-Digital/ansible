---
# UniFi API credentials.
# Encrypt this file with: ansible-vault encrypt unifi/vars/credentials.yml
# Run the playbook with:  ansible-playbook unifi/reboot.yml --ask-vault-pass

unifi_host: "192.168.100.3"    # IP or hostname of the UniFi Console
unifi_username: "admin"
unifi_password: "changeme"
unifi_validate_certs: false     # Set to true if using a trusted TLS certificate

# Sites to target. The 'id' must match the site name shown in the controller URL
# (e.g. https://<host>/network/<id>/dashboard).
unifi_sites:
  - name: "Site 1"
    id: "default"
  - name: "Site 2"
    id: "site2"
  - name: "Site 3"
    id: "site3"

# Set to true to also reboot the console itself (runs last, after all sites).
reboot_console: false
