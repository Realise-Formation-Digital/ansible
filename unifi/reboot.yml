---
# Playbook: reboot all UniFi switches across multiple sites via the UniFi OS API.
# Optionally reboots the UniFi Console itself (set reboot_console: true in credentials.yml).
#
# Targets UniFi OS (UDM, UDM-Pro, Cloud Key Gen2+).
# Runs entirely on localhost - no SSH connection to UniFi devices required.
# Sites are defined in vars/credentials.yml.
#
# Usage:
#   ansible-playbook unifi/reboot.yml --ask-vault-pass
#   ansible-playbook unifi/reboot.yml --ask-vault-pass -e "reboot_console=true"

- hosts: localhost
  gather_facts: false
  vars_files:
    - vars/credentials.yml

  tasks:

    # Authenticate against the UniFi OS API once for all sites.
    # Retrieves the session cookie and CSRF token required for subsequent requests.
    - name: Login to UniFi API
      ansible.builtin.uri:
        url: "https://{{ unifi_host }}/api/auth/login"
        method: POST
        body_format: json
        body:
          username: "{{ unifi_username }}"
          password: "{{ unifi_password }}"
        validate_certs: "{{ unifi_validate_certs }}"
        status_code: 200
      register: login_response

    # Store session credentials for reuse across all site iterations.
    - name: Store session credentials
      ansible.builtin.set_fact:
        unifi_csrf_token: "{{ login_response.x_csrf_token | default('') }}"
        unifi_cookie: "{{ login_response.cookies_string }}"

    # Process each site: fetch devices, filter switches, reboot them.
    # include_tasks is required here (import_tasks does not support loops).
    - name: Reboot switches for each site
      ansible.builtin.include_tasks: tasks/reboot_site.yml
      loop: "{{ unifi_sites }}"
      loop_control:
        loop_var: site
        label: "{{ site.name }}"

    # Reboot the UniFi Console itself. Runs last to keep the API available
    # for all switch reboot commands above. Disabled by default.
    - name: Reboot UniFi Console
      ansible.builtin.uri:
        url: "https://{{ unifi_host }}/api/system/reboot"
        method: POST
        headers:
          Cookie: "{{ unifi_cookie }}"
          X-CSRF-Token: "{{ unifi_csrf_token }}"
        validate_certs: "{{ unifi_validate_certs }}"
        status_code: 200
      when: reboot_console | bool
