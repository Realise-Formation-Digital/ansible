---
# Playbook: reboot all UniFi switches via the UniFi OS API.
# Optionally reboots the UniFi Console itself (set reboot_console: true in credentials.yml).
#
# Targets UniFi OS (UDM, UDM-Pro, Cloud Key Gen2+).
# Runs entirely on localhost - no SSH connection to UniFi devices required.
#
# Usage:
#   ansible-playbook unifi/reboot.yml --ask-vault-pass
#   ansible-playbook unifi/reboot.yml --ask-vault-pass -e "reboot_console=true"

- hosts: localhost
  gather_facts: false
  vars_files:
    - vars/credentials.yml

  tasks:

    # Authenticate against the UniFi OS API and retrieve the session cookie
    # and CSRF token required for subsequent requests.
    - name: Login to UniFi API
      ansible.builtin.uri:
        url: "https://{{ unifi_host }}/api/auth/login"
        method: POST
        body_format: json
        body:
          username: "{{ unifi_username }}"
          password: "{{ unifi_password }}"
        validate_certs: "{{ unifi_validate_certs }}"
        status_code: 200
      register: login_response

    # Store the CSRF token from the login response headers.
    # UniFi OS requires this token on all state-changing requests.
    - name: Set CSRF token
      ansible.builtin.set_fact:
        unifi_csrf_token: "{{ login_response.x_csrf_token | default('') }}"
        unifi_cookie: "{{ login_response.cookies_string }}"

    # Retrieve all devices managed by the site.
    - name: Get all UniFi devices
      ansible.builtin.uri:
        url: "https://{{ unifi_host }}/proxy/network/api/s/{{ unifi_site }}/stat/device"
        method: GET
        headers:
          Cookie: "{{ unifi_cookie }}"
          X-CSRF-Token: "{{ unifi_csrf_token }}"
        validate_certs: "{{ unifi_validate_certs }}"
        status_code: 200
      register: devices_response

    # Filter the device list to switches only (UniFi type: "usw").
    - name: Filter switches from device list
      ansible.builtin.set_fact:
        unifi_switches: "{{ devices_response.json.data | selectattr('type', 'equalto', 'usw') | list }}"

    # Display which switches will be rebooted before proceeding.
    - name: Show switches to be rebooted
      ansible.builtin.debug:
        msg: "Rebooting: {{ item.name }} (MAC: {{ item.mac }})"
      loop: "{{ unifi_switches }}"
      loop_control:
        label: "{{ item.name }}"

    # Send a restart command to each switch via the device manager API.
    # Switches reboot one at a time to avoid simultaneous network disruption.
    - name: Reboot all UniFi switches
      ansible.builtin.uri:
        url: "https://{{ unifi_host }}/proxy/network/api/s/{{ unifi_site }}/cmd/devmgr"
        method: POST
        body_format: json
        body:
          cmd: restart
          mac: "{{ item.mac }}"
        headers:
          Cookie: "{{ unifi_cookie }}"
          X-CSRF-Token: "{{ unifi_csrf_token }}"
        validate_certs: "{{ unifi_validate_certs }}"
        status_code: 200
      loop: "{{ unifi_switches }}"
      loop_control:
        label: "{{ item.name }} ({{ item.mac }})"

    # Reboot the UniFi Console itself. Runs last to keep the API available
    # for the switch reboot commands above. Disabled by default.
    - name: Reboot UniFi Console
      ansible.builtin.uri:
        url: "https://{{ unifi_host }}/api/system/reboot"
        method: POST
        headers:
          Cookie: "{{ unifi_cookie }}"
          X-CSRF-Token: "{{ unifi_csrf_token }}"
        validate_certs: "{{ unifi_validate_certs }}"
        status_code: 200
      when: reboot_console | bool
