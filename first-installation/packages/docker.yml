---
# Task list: Docker CE installation and Portainer Agent deployment on Ubuntu.
# Uses the modern GPG key method with /etc/apt/keyrings (signed-by)
# instead of the deprecated apt_key module.

# aptitude is required for advanced apt dependency management.
- name: Install aptitude
  ansible.builtin.apt:
    name: aptitude
    state: latest
    update_cache: true

# System packages required to add external repositories over HTTPS.
# Note: apt-transport-https is not needed on Ubuntu 18.04+ (built into apt).
- name: Install required system packages
  ansible.builtin.apt:
    pkg:
      - ca-certificates
      - curl
      - software-properties-common
    state: latest
    update_cache: true

# The /etc/apt/keyrings directory is required to store repository GPG keys.
- name: Ensure /etc/apt/keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

# Download GPG key and write the repository file using the same shell commands
# recommended in Docker's official installation docs. This avoids Ansible variable
# rendering issues (trailing newlines, undefined vars) and runs entirely as root.
- name: Add Docker GPG key and repository
  ansible.builtin.shell:
    cmd: |
          sudo apt update
          sudo apt install ca-certificates curl
          sudo install -m 0755 -d /etc/apt/keyrings
          sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
          sudo chmod a+r /etc/apt/keyrings/docker.asc

          sudo tee /etc/apt/sources.list.d/docker.sources <<EOF
          Types: deb
          URIs: https://download.docker.com/linux/ubuntu
          Suites: $(. /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}")
          Components: stable
          Signed-By: /etc/apt/keyrings/docker.asc
          EOF
  changed_when: false

# Explicitly refresh the apt cache after adding the Docker repository.
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true

# Install Docker Engine and the plugins required for compose and buildx.
- name: Install Docker
  ansible.builtin.apt:
    pkg:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: latest

# Create the 'docker' group to allow daemon access without sudo.
- name: Create "docker" group
  ansible.builtin.group:
    name: docker
    state: present

# Add the primary admin user to the docker group (defined in group_vars/all/vault.yml).
- name: Add admin user to "docker" group
  ansible.builtin.user:
    name: "{{ vault_admin_user }}"
    groups: docker
    append: true

# Start the Portainer Agent container listening on port 9001.
# Allows a central Portainer instance to manage this host.
# - /var/run/docker.sock: access to the local Docker daemon
# - /var/lib/docker/volumes: visibility over Docker volumes
# Pin the image version to ensure reproducible deployments.
- name: Deploy Portainer Agent
  community.docker.docker_container:
    name: portainer_agent
    image: portainer/agent:2.21.0
    state: started
    restart_policy: always
    ports:
      - "9001:9001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
