---
# Task list: Docker CE installation and Portainer Agent deployment on Ubuntu.
# Uses the modern GPG key method with /etc/apt/keyrings (signed-by)
# instead of the deprecated apt_key module.

# aptitude is required for advanced apt dependency management.
- name: Install aptitude
  apt:
    name: aptitude
    state: latest
    update_cache: true

# System packages required to add external repositories over HTTPS.
- name: Install required system packages
  apt:
    pkg:
      - apt-transport-https
      - ca-certificates
      - curl
      - software-properties-common
      - python3-pip
      - virtualenv
      - python3-setuptools
    state: latest
    update_cache: true

# The /etc/apt/keyrings directory is required to store repository GPG keys.
- name: Ensure /etc/apt/keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

# Detect the system architecture (e.g. amd64, arm64) for the correct Docker repository.
- name: Get Ubuntu architecture
  ansible.builtin.command: dpkg --print-architecture
  register: deb_architecture
  changed_when: false

# Download the official Docker GPG key to verify repository packages.
- name: Add Docker GPG apt Key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
    force: true

# Add the official Docker repository for the current Ubuntu release (e.g. noble, jammy).
# ansible_distribution_release is detected automatically by Ansible.
- name: Add Docker Repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ deb_architecture.stdout }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    update_cache: yes
    filename: docker

# Install Docker Engine and the plugins required for compose and buildx.
- name: Install docker stuff
  apt:
    pkg:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: latest
    update_cache: true

# Create the 'docker' group to allow daemon access without sudo.
- name: Create "docker" group
  group:
    name: "docker"
    state: present

# Add the 'realise' user to the docker group so they can run Docker commands without sudo.
- name: Add remote "realise" user to "docker" group
  user:
    name: "realise"
    groups: "docker"
    append: yes

# Add the 'maintenance' user to the docker group so Semaphore can run Docker commands.
- name: Add maintenance user to "docker" group
  user:
    name: "maintenance"
    groups: "docker"
    append: yes

# Start the Portainer Agent container listening on port 9001.
# Allows a central Portainer instance to manage this host.
# - /var/run/docker.sock: access to the local Docker daemon
# - /var/lib/docker/volumes: visibility over Docker volumes
- name: Deploy Portainer Agent
  community.docker.docker_container:
    name: portainer_agent
    image: portainer/agent:latest
    state: started
    restart_policy: always
    ports:
      - "9001:9001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
