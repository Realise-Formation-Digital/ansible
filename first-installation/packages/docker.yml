---
# Task list: Docker CE installation and Portainer Agent deployment on Ubuntu.
# Uses the modern GPG key method with /etc/apt/keyrings (signed-by)
# instead of the deprecated apt_key module.

# aptitude is required for advanced apt dependency management.
- name: Install aptitude
  ansible.builtin.apt:
    name: aptitude
    state: latest
    update_cache: true

# System packages required to add external repositories over HTTPS.
# Note: apt-transport-https is not needed on Ubuntu 18.04+ (built into apt).
- name: Install required system packages
  ansible.builtin.apt:
    pkg:
      - ca-certificates
      - curl
      - software-properties-common
    state: latest
    update_cache: true

# The /etc/apt/keyrings directory is required to store repository GPG keys.
- name: Ensure /etc/apt/keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

# Detect the system architecture (e.g. amd64, arm64) for the correct Docker repository.
- name: Get Ubuntu architecture
  ansible.builtin.command: dpkg --print-architecture
  register: deb_architecture
  changed_when: false

# Download the official Docker GPG key directly with curl as root.
# get_url is avoided here: it checks directory writability as the connection user
# before applying become, causing a false "not writable" error on /etc/apt/keyrings.
- name: Add Docker GPG apt Key
  ansible.builtin.shell:
    cmd: curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc && chmod 0644 /etc/apt/keyrings/docker.asc
    creates: /etc/apt/keyrings/docker.asc
  changed_when: true

# Add the official Docker repository for the current Ubuntu release (e.g. noble, jammy).
# ansible_distribution_release is detected automatically by Ansible.
- name: Add Docker Repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ deb_architecture.stdout }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    update_cache: true
    filename: docker

# Install Docker Engine and the plugins required for compose and buildx.
- name: Install Docker
  ansible.builtin.apt:
    pkg:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: latest
    update_cache: true

# Create the 'docker' group to allow daemon access without sudo.
- name: Create "docker" group
  ansible.builtin.group:
    name: docker
    state: present

# Add the primary admin user to the docker group (defined in group_vars/all/vault.yml).
- name: Add admin user to "docker" group
  ansible.builtin.user:
    name: "{{ vault_admin_user }}"
    groups: docker
    append: true

# Start the Portainer Agent container listening on port 9001.
# Allows a central Portainer instance to manage this host.
# - /var/run/docker.sock: access to the local Docker daemon
# - /var/lib/docker/volumes: visibility over Docker volumes
# Pin the image version to ensure reproducible deployments.
- name: Deploy Portainer Agent
  community.docker.docker_container:
    name: portainer_agent
    image: portainer/agent:2.21.0
    state: started
    restart_policy: always
    ports:
      - "9001:9001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
